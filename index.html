<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollLike · sliding dimensions</title>
  
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ---------- ORIGINAL BACKGROUND ANIMATION ---------- */
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --glass-bg: rgba(18, 18, 26, 0.7);
      --accent-1: #ff6b9d;
      --accent-2: #9d7bff;
      --accent-3: #6ed4b0;
      --accent-4: #ffb86b;
      --text-primary: #ffffff;
      --text-secondary: #b0b0c0;
      --card-bg: #16161f;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --glow-color: rgba(157, 123, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* custom smooth scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent-1), var(--accent-2));
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, var(--accent-2), var(--accent-3));
    }

    /* ORIGINAL animated background with moving orbs */
    .background-orb {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -2;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: orbFloat 20s infinite alternate ease-in-out;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: var(--accent-1);
      top: -100px;
      left: -100px;
      animation-duration: 25s;
    }

    .orb2 {
      width: 600px;
      height: 600px;
      background: var(--accent-2);
      bottom: -200px;
      right: -100px;
      animation-duration: 30s;
      animation-delay: -5s;
    }

    .orb3 {
      width: 400px;
      height: 400px;
      background: var(--accent-3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 35s;
      animation-delay: -10s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 100px) scale(1.2); }
    }

    /* ORIGINAL particle network */
    #particle-network {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ---------- STICKY NAVBAR ---------- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding: 1rem 2rem;
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .nav-content {
      width: 100%;
      max-width: 1400px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(18, 18, 26, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .nav-content:hover {
      border-color: var(--accent-1);
      box-shadow: 0 20px 40px -15px rgba(255, 107, 157, 0.3);
      transform: translateY(-2px);
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-1), var(--accent-2), transparent);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .logo:hover::after {
      transform: scaleX(1);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      position: relative;
      padding: 0.5rem 0;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }

    .nav-link:hover {
      color: white;
    }

    .nav-link:hover::before {
      transform: scaleX(1);
      transform-origin: left;
    }

    .nav-icons {
      display: flex;
      gap: 1rem;
    }

    .nav-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .nav-icon:hover {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      transform: rotate(360deg) scale(1.1);
      border-color: transparent;
    }

    /* ---------- HERO SECTION ---------- */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 900px;
      padding: 0 2rem;
      z-index: 2;
    }

    .hero-title {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(50px);
      animation: heroReveal 1s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    .hero-title span {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes heroReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--accent-1)); }
      33% { filter: drop-shadow(0 0 30px var(--accent-2)); }
      66% { filter: drop-shadow(0 0 25px var(--accent-3)); }
    }

    .hero-subtitle {
      font-size: 1.5rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 2rem;
      opacity: 0;
      transform: translateY(30px);
      animation: heroReveal 1s 0.3s forwards;
    }

    .hero-cta {
      opacity: 0;
      transform: translateY(30px);
      animation: heroReveal 1s 0.6s forwards;
    }

    .cta-button {
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .cta-button:hover::before {
      left: 100%;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px -10px var(--accent-1);
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    /* ---------- SLIDING FEED ---------- */
    .feed {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 4rem;
      position: relative;
      z-index: 10;
    }

    /* SLIDING POST CARDS - alternating directions */
    .post-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8);
      transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
    }

    /* Slide from LEFT for even cards */
    .post-card:nth-child(even) {
      transform: translateX(-100px) scale(0.95);
    }

    /* Slide from RIGHT for odd cards */
    .post-card:nth-child(odd) {
      transform: translateX(100px) scale(0.95);
    }

    .post-card.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    /* magnetic border effect */
    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 2;
    }

    .post-card:hover::before {
      opacity: 1;
    }

    .post-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 50px 80px -30px var(--accent-2);
    }

    /* image container */
    .img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1e1e2a;
    }

    .post-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
    }

    .post-card:hover .post-img {
      transform: scale(1.1);
    }

    /* direction badge */
    .direction-badge {
      position: absolute;
      top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid rgba(255, 107, 157, 0.5);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transform: translateX(20px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .post-card:nth-child(even) .direction-badge {
      left: 1.5rem;
    }

    .post-card:nth-child(odd) .direction-badge {
      right: 1.5rem;
    }

    .post-card:hover .direction-badge {
      transform: translateX(0);
      opacity: 1;
    }

    .direction-badge i {
      color: var(--accent-1);
    }

    /* author info overlay */
    .author-overlay {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 5;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.1s;
    }

    .post-card:hover .author-overlay {
      transform: translateY(0);
      opacity: 1;
    }

    .author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      border: 2px solid white;
    }

    .author-details {
      display: flex;
      flex-direction: column;
    }

    .author-name {
      font-weight: 600;
      color: white;
    }

    .post-date {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
    }

    /* slide track indicator */
    .slide-track {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
      transform: scaleX(0);
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      transform-origin: left;
      z-index: 3;
    }

    .post-card:nth-child(odd) .slide-track {
      transform-origin: right;
    }

    .post-card:hover .slide-track {
      transform: scaleX(1);
    }

    /* post content */
    .post-content {
      padding: 2rem;
      position: relative;
      z-index: 4;
      background: var(--card-bg);
    }

    .caption {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff, #d0d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* like button */
    .like-btn {
      background: rgba(255, 107, 157, 0.1);
      border: 1px solid rgba(255, 107, 157, 0.3);
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .like-btn:hover {
      background: rgba(255, 107, 157, 0.2);
      border-color: var(--accent-1);
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 30px -10px var(--accent-1);
    }

    .heart-icon {
      font-size: 1.8rem;
      color: var(--accent-1);
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 5px var(--accent-1));
    }

    .like-btn.liked .heart-icon {
      animation: heartSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      color: #ff3b6f;
      filter: drop-shadow(0 0 15px #ff3b6f);
    }

    @keyframes heartSlide {
      0% { transform: translateX(0) scale(1); }
      30% { transform: translateX(-15px) scale(1.5); }
      50% { transform: translateX(8px) scale(0.9); }
      70% { transform: translateX(-5px) scale(1.2); }
      100% { transform: translateX(0) scale(1); }
    }

    .like-count {
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
    }

    /* floating hearts */
    .heart-particle {
      position: absolute;
      pointer-events: none;
      font-size: 1rem;
      animation: heartFloat 1.5s ease-out forwards;
      z-index: 100;
    }

    @keyframes heartFloat {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(0) rotate(720deg);
        opacity: 0;
      }
    }

    /* floating action button */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 10px 30px -5px var(--accent-1);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }

    .fab:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 20px 40px -5px var(--accent-2);
    }

    /* loading screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-content {
      text-align: center;
    }

    .loading-logo {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: loadingPulse 1.5s ease-in-out infinite;
    }

    @keyframes loadingPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .loading-bar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-top: 2rem;
      position: relative;
      overflow: hidden;
    }

    .loading-bar::before {
      content: '';
      position: absolute;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      animation: loadingSlide 1.5s infinite ease-in-out;
    }

    @keyframes loadingSlide {
      0% { left: -50%; }
      100% { left: 100%; }
    }

    /* responsive */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 3rem;
      }
      
      .nav-links {
        display: none;
      }
      
      .post-card {
        border-radius: 30px;
      }
      
      .post-content {
        padding: 1.5rem;
      }
      
      .caption {
        font-size: 1.2rem;
      }
      
      .fab {
        bottom: 1rem;
        right: 1rem;
      }
      
      .direction-badge {
        font-size: 0.8rem;
        padding: 0.4rem 1rem;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 2.2rem;
      }
      
      .hero-subtitle {
        font-size: 1.1rem;
      }
      
      .author-overlay {
        left: 1rem;
        bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- ORIGINAL Animated Background Orbs -->
  <div class="background-orb">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <!-- ORIGINAL Particle Network -->
  <canvas id="particle-network"></canvas>

  <!-- Loading Screen -->
  <!-- <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="loading-logo">ScrollLike</div>
      <div class="loading-bar"></div>
    </div>
  </div> -->

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <div class="logo">ScrollLike</div>
      <div class="nav-links">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Explore</a>
        <a href="#" class="nav-link">Studio</a>
        <a href="#" class="nav-link">Profile</a>
      </div>
      <div class="nav-icons">
        <div class="nav-icon"><i class="fas fa-search"></i></div>
        <div class="nav-icon"><i class="fas fa-bell"></i></div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        scroll into the <span>infinite</span>
      </h1>
      <p class="hero-subtitle">
        Watch cards glide from left and right as you scroll through an endless stream of visual stories.
      </p>
      <div class="hero-cta">
        <button class="cta-button">Start Sliding</button>
      </div>
    </div>
    <div class="scroll-indicator">
      <span>Scroll to discover</span>
      <i class="fas fa-chevron-down"></i>
    </div>
  </section>

  <!-- Main Feed with Sliding Cards -->
  <main class="feed" id="feed"></main>

  <!-- Floating Action Button -->
  <div class="fab" id="fab">
    <i class="fas fa-arrow-up"></i>
  </div>

  <script>
    (function() {
      // ---------- SLIDING POSTS DATA ----------
      const posts = [
        {
          id: 1,
          img: 'https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
          caption: 'electric horizon • sliding into neon dreams',
          author: 'cyber.pulse',
          date: '2h ago',
          likes: 1234,
          avatar: 'CP',
          direction: '← slides from right'
        },
        {
          id: 2,
          img: 'https://images.pexels.com/photos/3761509/pexels-photo-3761509.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
          caption: 'tranquil waves • ocean meditation',
          author: 'ocean.eye',
          date: '5h ago',
          likes: 892,
          avatar: 'OE',
          direction: 'slides from left →'
        },
        {
          id: 3,
          img: 'https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',

          author: 'future.freq',
          date: '1d ago',
          likes: 3456,
          avatar: 'FF',
          direction: 'slides from left →'
        }
      ];

      const feed = document.getElementById('feed');
      const loadingScreen = document.getElementById('loadingScreen');
      const navbar = document.getElementById('navbar');
      const fab = document.getElementById('fab');

      // ---------- ORIGINAL PARTICLE NETWORK ----------
      function initParticleNetwork() {
        const canvas = document.getElementById('particle-network');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }
        
        function createParticles() {
          for (let i = 0; i < 50; i++) {
            particles.push({
              x: Math.random() * width,
              y: Math.random() * height,
              vx: (Math.random() - 0.5) * 0.5,
              vy: (Math.random() - 0.5) * 0.5,
              radius: Math.random() * 2 + 1
            });
          }
        }
        
        function draw() {
          ctx.clearRect(0, 0, width, height);
          
          // draw connections
          ctx.strokeStyle = 'rgba(157, 123, 255, 0.1)';
          ctx.lineWidth = 0.5;
          
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const distance = Math.sqrt(dx * dx + dy * dy);
              
              if (distance < 150) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(157, 123, 255, ${0.1 * (1 - distance/150)})`;
                ctx.stroke();
              }
            }
          }
          
          // draw particles
          particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 107, 157, 0.5)';
            ctx.fill();
            
            // update position
            p.x += p.vx;
            p.y += p.vy;
            
            // bounce off edges
            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;
          });
          
          requestAnimationFrame(draw);
        }
        
        resize();
        createParticles();
        draw();
        
        window.addEventListener('resize', () => {
          resize();
          particles = [];
          createParticles();
        });
      }
      
      initParticleNetwork();

      // Hide loading screen
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
      }, 2000);

      // Create sliding cards
      function createSlidingCards() {
        feed.innerHTML = '';
        
        posts.forEach((post, index) => {
          const card = document.createElement('article');
          card.className = 'post-card';
          card.setAttribute('data-id', post.id);
          
          // Add direction-specific icon
          const directionIcon = index % 2 === 0 ? 'fa-arrow-left' : 'fa-arrow-right';

          card.innerHTML = `
            <div class="img-container">
              <img class="post-img" src="${post.img}" alt="${post.caption}" loading="lazy">
              
              <div class="direction-badge">
                <i class="fas ${directionIcon}"></i>
                ${post.direction}
              </div>
              
              <div class="author-overlay">
                <div class="author-avatar">${post.avatar}</div>
                <div class="author-details">
                  <span class="author-name">@${post.author}</span>
                  <span class="post-date">${post.date}</span>
                </div>
              </div>
              
              <div class="slide-track"></div>
            </div>
            
            <div class="post-content">
              <div class="caption">${post.caption}</div>
              
              <button class="like-btn">
                <i class="far fa-heart heart-icon"></i>
                <span class="like-count">${post.likes.toLocaleString()}</span>
              </button>
            </div>
            
          `;

          feed.appendChild(card);
        });

        initializeLikeButtons();
        initializeScrollObserver();
      }

      // Like button functionality
      function initializeLikeButtons() {
        const likeButtons = document.querySelectorAll('.like-btn');
        
        likeButtons.forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const heartIcon = this.querySelector('.heart-icon');
            const likeCount = this.querySelector('.like-count');
            const wasLiked = this.classList.contains('liked');
            
            // heart animation
            heartIcon.style.animation = 'none';
            heartIcon.offsetHeight;
            
            if (!wasLiked) {
              this.classList.add('liked');
              heartIcon.classList.remove('far');
              heartIcon.classList.add('fas');
              let current = parseInt(likeCount.innerText.replace(',', ''));
              likeCount.innerText = (current + 1).toLocaleString();
              
              // create floating hearts
              for (let i = 0; i < 8; i++) {
                createFloatingHeart(this);
              }
            } else {
              this.classList.remove('liked');
              heartIcon.classList.remove('fas');
              heartIcon.classList.add('far');
              let current = parseInt(likeCount.innerText.replace(',', ''));
              likeCount.innerText = (current - 1).toLocaleString();
            }
          });
        });
      }

      // Floating hearts
      function createFloatingHeart(element) {
        const heart = document.createElement('i');
        heart.className = 'fas fa-heart heart-particle';
        
        const x = (Math.random() - 0.5) * 200;
        const y = -150 - Math.random() * 100;
        
        heart.style.setProperty('--x', x + 'px');
        heart.style.setProperty('--y', y + 'px');
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = Math.random() * 100 + '%';
        heart.style.color = `hsl(${340 + Math.random() * 20}, 100%, 65%)`;
        heart.style.fontSize = (12 + Math.random() * 20) + 'px';
        
        element.style.position = 'relative';
        element.appendChild(heart);
        
        setTimeout(() => heart.remove(), 1500);
      }

      // Intersection Observer for sliding reveal
      function initializeScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              
              // Add direction-specific transition delay
              const isEven = Array.from(entry.target.parentNode.children).indexOf(entry.target) % 2 === 0;
              entry.target.style.transitionDelay = isEven ? '0.1s' : '0.2s';
            }
          });
        }, {
          threshold: 0.3,
          rootMargin: '0px'
        });

        document.querySelectorAll('.post-card').forEach(card => {
          observer.observe(card);
        });

        // Pre-reveal first card
        setTimeout(() => {
          const firstCard = document.querySelector('.post-card');
          if (firstCard) {
            firstCard.classList.add('visible');
          }
        }, 500);
      }

      // Navbar scroll effect
      window.addEventListener('scroll', () => {
        if (window.scrollY > 100) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      });

      // FAB click
      fab.addEventListener('click', () => {
        fab.style.transform = 'scale(0.9) rotate(90deg)';
        setTimeout(() => {
          fab.style.transform = '';
          window.scrollTo({
            top: 0,
            behavior: 'smooth'
          });
        }, 200);
      });

      // CTA button
      document.querySelector('.cta-button').addEventListener('click', () => {
        document.querySelector('.feed').scrollIntoView({
          behavior: 'smooth'
        });
      });

      // Initialize
      createSlidingCards();
    })();
  </script>
