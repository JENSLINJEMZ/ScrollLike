<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollLike · next generation scrolling</title>
  
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ---------- style.css – ULTIMATE EDITION ---------- */
    
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --glass-bg: rgba(18, 18, 26, 0.7);
      --accent-1: #ff6b9d;
      --accent-2: #9d7bff;
      --accent-3: #6ed4b0;
      --accent-4: #ffb86b;
      --text-primary: #ffffff;
      --text-secondary: #b0b0c0;
      --card-bg: #16161f;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --glow-color: rgba(157, 123, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* custom smooth scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent-1), var(--accent-2));
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, var(--accent-2), var(--accent-3));
    }

    /* animated background with moving orbs */
    .background-orb {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -2;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: orbFloat 20s infinite alternate ease-in-out;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: var(--accent-1);
      top: -100px;
      left: -100px;
      animation-duration: 25s;
    }

    .orb2 {
      width: 600px;
      height: 600px;
      background: var(--accent-2);
      bottom: -200px;
      right: -100px;
      animation-duration: 30s;
      animation-delay: -5s;
    }

    .orb3 {
      width: 400px;
      height: 400px;
      background: var(--accent-3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 35s;
      animation-delay: -10s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 100px) scale(1.2); }
    }

    /* particle network */
    #particle-network {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ---------- STICKY NAVBAR ---------- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding: 1rem 2rem;
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .nav-content {
      width: 100%;
      max-width: 1400px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(18, 18, 26, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .nav-content:hover {
      border-color: var(--accent-1);
      box-shadow: 0 20px 40px -15px rgba(255, 107, 157, 0.3);
      transform: translateY(-2px);
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-1), var(--accent-2), transparent);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .logo:hover::after {
      transform: scaleX(1);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      position: relative;
      padding: 0.5rem 0;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }

    .nav-link:hover {
      color: white;
    }

    .nav-link:hover::before {
      transform: scaleX(1);
      transform-origin: left;
    }

    .nav-icons {
      display: flex;
      gap: 1rem;
    }

    .nav-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .nav-icon:hover {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      transform: rotate(360deg) scale(1.1);
      border-color: transparent;
    }

    /* ---------- HERO SECTION ---------- */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 900px;
      padding: 0 2rem;
      z-index: 2;
    }

    .hero-title {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(50px);
      animation: heroReveal 1s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    .hero-title span {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes heroReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--accent-1)); }
      33% { filter: drop-shadow(0 0 30px var(--accent-2)); }
      66% { filter: drop-shadow(0 0 25px var(--accent-3)); }
    }

    .hero-subtitle {
      font-size: 1.5rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 2rem;
      opacity: 0;
      transform: translateY(30px);
      animation: heroReveal 1s 0.3s forwards;
    }

    .hero-cta {
      opacity: 0;
      transform: translateY(30px);
      animation: heroReveal 1s 0.6s forwards;
    }

    .cta-button {
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .cta-button:hover::before {
      left: 100%;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px -10px var(--accent-1);
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    /* ---------- MAIN FEED ---------- */
    .feed {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
      position: relative;
      z-index: 10;
    }

    .post-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8);
      transform: translateY(0) scale(1);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      transform: translateY(50px);
    }

    .post-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* magnetic border effect */
    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 2;
    }

    .post-card:hover::before {
      opacity: 1;
    }

    .post-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 50px 80px -30px var(--accent-2);
    }

    /* image container */
    .img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1e1e2a;
    }

    .post-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      will-change: transform;
    }

    .post-card:hover .post-img {
      transform: scale(1.1);
    }

    /* image overlay with comment, save, share buttons */
    .img-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.9));
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 3;
    }

    .post-card:hover .img-overlay {
      transform: translateY(0);
    }

    .overlay-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }

    .overlay-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 1.2rem;
    }

    .overlay-btn:hover {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      transform: scale(1.1) rotate(360deg);
      border-color: transparent;
      box-shadow: 0 0 20px var(--accent-1);
    }

    /* author info moved to bottom */
    .author-info {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 4;
    }

    .author-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      border: 2px solid white;
    }

    .author-details {
      display: flex;
      flex-direction: column;
    }

    .author-name {
      font-weight: 600;
      color: white;
      font-size: 0.9rem;
    }

    .post-date {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
    }

    /* post content */
    .post-content {
      padding: 2rem;
      position: relative;
      z-index: 4;
      background: var(--card-bg);
    }

    .caption {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff, #d0d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* interaction bar - now only like button */
    .interaction-bar {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .like-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .like-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .like-btn:hover {
      background: rgba(255, 107, 157, 0.1);
      border-color: var(--accent-1);
      transform: scale(1.05);
    }

    .heart-icon {
      font-size: 1.8rem;
      color: var(--accent-1);
      transition: all 0.3s ease;
    }

    .like-btn.liked .heart-icon {
      animation: heartExplode 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5);
      color: #ff3b6f;
      filter: drop-shadow(0 0 15px #ff3b6f);
    }

    @keyframes heartExplode {
      0% { transform: scale(1); }
      30% { transform: scale(1.8) rotate(15deg); }
      50% { transform: scale(0.9) rotate(-10deg); }
      70% { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .like-count {
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
    }

    /* comment section */
    .comment-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .comment-input {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .comment-input input {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 50px;
      padding: 0.8rem 1.2rem;
      color: white;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .comment-input input:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
    }

    .comment-input button {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .comment-input button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--accent-1);
    }

    .comments-list {
      margin-top: 1rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease;
    }

    .post-card:hover .comments-list {
      max-height: 200px;
    }

    .comment {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .comment-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* floating action button */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 10px 30px -5px var(--accent-1);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }

    .fab:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 20px 40px -5px var(--accent-2);
    }

    /* tooltip */
    .tooltip {
      position: fixed;
      background: rgba(18, 18, 26, 0.9);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      color: white;
      font-size: 0.9rem;
      border: 1px solid var(--accent-1);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    /* responsive */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 3rem;
      }
      
      .nav-links {
        display: none;
      }
      
      .post-card {
        border-radius: 30px;
      }
      
      .post-content {
        padding: 1.5rem;
      }
      
      .fab {
        bottom: 1rem;
        right: 1rem;
      }
      
      .overlay-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background Orbs -->
  <div class="background-orb">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <canvas id="particle-network"></canvas>

  <!-- Navbar (profile icon removed) -->
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <div class="logo">ScrollLike</div>
      <div class="nav-links">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Explore</a>
        <a href="#" class="nav-link">Studio</a>
        <a href="#" class="nav-link">Profile</a>
      </div>
      <div class="nav-icons">
        <div class="nav-icon"><i class="fas fa-search"></i></div>
        <div class="nav-icon"><i class="fas fa-bell"></i></div>
        <!-- Profile icon removed -->
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        scroll into the <span>infinite</span>
      </h1>
      <p class="hero-subtitle">
        Where every scroll reveals a new story, every like creates a memory
      </p>
      <div class="hero-cta">
        <button class="cta-button">Start Exploring</button>
      </div>
    </div>
    <div class="scroll-indicator">
      <span>Scroll to discover</span>
      <i class="fas fa-chevron-down"></i>
    </div>
  </section>

  <!-- Main Feed -->
  <main class="feed" id="feed"></main>

  <!-- Floating Action Button -->
  <div class="fab" id="fab">
    <i class="fas fa-plus"></i>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

          img: 'https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
          caption: 'neon avenue • midnight drive',
          author: 'street.pulse',
          date: '1d ago',
          likes: 3456,
          comments: 234,
          avatar: 'SP',
          comments_list: ['cyberpunk vibes', '🔥🔥🔥']
        },
        {
          id: 6,
          img: 'https://images.pexels.com/photos/3617456/pexels-photo-3617456.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2',
          caption: 'purple haze • coffee dreams',
          author: 'vibes.only',
          date: '1d ago',
          likes: 789,
          comments: 67,
          avatar: 'VO',
          comments_list: ['aesthetic overload', 'love the colors']
        }
      ];

      const feed = document.getElementById('feed');
      
      // ---------- PARTICLE NETWORK ----------
      function initParticleNetwork() {
        const canvas = document.getElementById('particle-network');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }
        
        function createParticles() {
          for (let i = 0; i < 50; i++) {
            particles.push({
              x: Math.random() * width,
              y: Math.random() * height,
              vx: (Math.random() - 0.5) * 0.5,
              vy: (Math.random() - 0.5) * 0.5,
              radius: Math.random() * 2 + 1
            });
          }
        }
        
        function draw() {
          ctx.clearRect(0, 0, width, height);
          
          // draw connections
          ctx.strokeStyle = 'rgba(157, 123, 255, 0.1)';
          ctx.lineWidth = 0.5;
          
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const distance = Math.sqrt(dx * dx + dy * dy);
              
              if (distance < 150) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(157, 123, 255, ${0.1 * (1 - distance/150)})`;
                ctx.stroke();
              }
            }
          }
          
          // draw particles
          particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 107, 157, 0.5)';
            ctx.fill();
            
            // update position
            p.x += p.vx;
            p.y += p.vy;
            
            // bounce off edges
            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;
          });
          
          requestAnimationFrame(draw);
        }
        
        resize();
        createParticles();
        draw();
        
        window.addEventListener('resize', () => {
          resize();
          particles = [];
          createParticles();
        });
      }
      
      initParticleNetwork();

      // ---------- CREATE POSTS (with relocated buttons) ----------
      function createPosts() {
        feed.innerHTML = '';
        
        posts.forEach((post, index) => {
          const card = document.createElement('article');
          card.className = 'post-card';
          card.style.transitionDelay = index * 0.1 + 's';
          card.setAttribute('data-id', post.id);

          card.innerHTML = `
            <div class="img-container">
              <img class="post-img" src="${post.img}" alt="${post.caption}" loading="lazy">
              
              <!-- Author info moved to top left of image -->
              <div class="author-info">
                <div class="author-avatar">${post.avatar}</div>
                <div class="author-details">
                  <span class="author-name">@${post.author}</span>
                  <span class="post-date">${post.date}</span>
                </div>
              </div>
              
              <!-- Overlay with comment, save, share buttons -->
              <div class="img-overlay">
                <div class="overlay-buttons">
                  <button class="overlay-btn comment-btn" title="Comment">
                    <i class="far fa-comment"></i>
                  </button>
                  <button class="overlay-btn save-btn" title="Save">
                    <i class="far fa-bookmark"></i>
                  </button>
                  <button class="overlay-btn share-btn" title="Share">
                    <i class="far fa-share-square"></i>
                  </button>
                </div>
              </div>
            </div>
            
            <div class="post-content">
              <div class="caption">${post.caption}</div>
              
              <div class="interaction-bar">
                <div class="like-section">
                  <button class="like-btn">
                    <i class="far fa-heart heart-icon"></i>
                    <span class="like-count">${post.likes.toLocaleString()}</span>
                  </button>
                  <span class="comment-count"><i class="far fa-comment"></i> ${post.comments}</span>
                </div>
              </div>
              
              <div class="comment-section">
                <div class="comment-input">
                  <input type="text" placeholder="Add a comment..." class="comment-field">
                  <button class="send-comment"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="comments-list">
                  ${post.comments_list.map(comment => `
                    <div class="comment">
                      <div class="comment-avatar">👤</div>
                      <span>${comment}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          `;

          feed.appendChild(card);
        });

        initializeFeatures();
      }

      // ---------- INITIALIZE ALL FEATURES ----------
      function initializeFeatures() {
        // Like button functionality
        const likeButtons = document.querySelectorAll('.like-btn');
        
        likeButtons.forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const heartIcon = this.querySelector('.heart-icon');
            const likeCount = this.querySelector('.like-count');
            const wasLiked = this.classList.contains('liked');
            
            // heart animation
            heartIcon.style.animation = 'none';
            heartIcon.offsetHeight;
            heartIcon.style.animation = 'heartExplode 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5)';
            
            // create floating hearts
            for (let i = 0; i < 5; i++) {
              createFloatingHeart(this);
            }
            
            if (!wasLiked) {
              this.classList.add('liked');
              heartIcon.classList.remove('far');
              heartIcon.classList.add('fas');
              let current = parseInt(likeCount.innerText.replace(',', ''));
              likeCount.innerText = (current + 1).toLocaleString();
            } else {
              this.classList.remove('liked');
              heartIcon.classList.remove('fas');
              heartIcon.classList.add('far');
              let current = parseInt(likeCount.innerText.replace(',', ''));
              likeCount.innerText = (current - 1).toLocaleString();
            }
          });
        });

        // Overlay buttons functionality
        const commentBtns = document.querySelectorAll('.comment-btn');
        const saveBtns = document.querySelectorAll('.save-btn');
        const shareBtns = document.querySelectorAll('.share-btn');
        
        commentBtns.forEach(btn => {
          btn.addEventListener('click', function() {
            const commentInput = this.closest('.post-card').querySelector('.comment-field');
            commentInput.focus();
            
            // Visual feedback
            this.style.transform = 'scale(1.2)';
            setTimeout(() => {
              this.style.transform = '';
            }, 200);
          });
        });
        
        saveBtns.forEach(btn => {
          btn.addEventListener('click', function() {
            const icon = this.querySelector('i');
            icon.classList.toggle('far');
            icon.classList.toggle('fas');
            
            if (icon.classList.contains('fas')) {
              this.style.background = 'linear-gradient(135deg, var(--accent-3), var(--accent-4))';
              showTooltip(this, 'Saved!');
            } else {
              this.style.background = '';
              showTooltip(this, 'Removed');
            }
          });
        });
        
        shareBtns.forEach(btn => {
          btn.addEventListener('click', function() {
            showTooltip(this, 'Link copied!');
            
            // Animation
            this.style.transform = 'scale(1.2) rotate(360deg)';
            setTimeout(() => {
              this.style.transform = '';
            }, 300);
          });
        });

        // Comment functionality
        const sendButtons = document.querySelectorAll('.send-comment');
        sendButtons.forEach(btn => {
          btn.addEventListener('click', function() {
            const input = this.parentElement.querySelector('.comment-field');
            const commentText = input.value.trim();
            
            if (commentText) {
              const commentsList = this.closest('.comment-section').querySelector('.comments-list');
              const newComment = document.createElement('div');
              newComment.className = 'comment';
              newComment.innerHTML = `
                <div class="comment-avatar">✨</div>
                <span>${commentText}</span>
              `;
              commentsList.appendChild(newComment);
              input.value = '';
              
              // animate new comment
              newComment.style.animation = 'slideIn 0.3s ease';
              
              // Update comment count
              const commentCount = this.closest('.post-card').querySelector('.comment-count');
              const currentCount = parseInt(commentCount.innerText);
              commentCount.innerHTML = `<i class="far fa-comment"></i> ${currentCount + 1}`;
            }
          });
        });

        // Tooltip functionality for overlay buttons
        const overlayBtns = document.querySelectorAll('.overlay-btn');
        const tooltip = document.getElementById('tooltip');
        
        overlayBtns.forEach(btn => {
          btn.addEventListener('mouseenter', (e) => {
            let text = '';
            if (btn.classList.contains('comment-btn')) text = 'Comment';
            if (btn.classList.contains('save-btn')) text = 'Save';
            if (btn.classList.contains('share-btn')) text = 'Share';
            
            tooltip.style.opacity = '1';
            tooltip.style.left = e.pageX + 'px';
            tooltip.style.top = (e.pageY - 40) + 'px';
            tooltip.textContent = text;
          });
          
          btn.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
          });
        });

        // Intersection Observer for fade-in
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, {
          threshold: 0.2,
          rootMargin: '0px'
        });

        document.querySelectorAll('.post-card').forEach(card => {
          observer.observe(card);
        });

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
          const navbar = document.getElementById('navbar');
          if (window.scrollY > 100) {
            navbar.classList.add('scrolled');
          } else {
            navbar.classList.remove('scrolled');
          }
        });
      }

      function createFloatingHeart(element) {
        const heart = document.createElement('i');
        heart.className = 'fas fa-heart';
        heart.style.position = 'absolute';
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = Math.random() * 100 + '%';
        heart.style.color = `hsl(${340 + Math.random() * 20}, 100%, 70%)`;
        heart.style.fontSize = (10 + Math.random() * 20) + 'px';
        heart.style.pointerEvents = 'none';
        heart.style.animation = `floatUp ${1 + Math.random()}s ease-out forwards`;
        
        const style = document.createElement('style');
        style.textContent = `
          @keyframes floatUp {
            0% {
              transform: translate(0, 0) scale(1);
              opacity: 1;
            }
            100% {
              transform: translate(${(Math.random() - 0.5) * 100}px, -100px) scale(0);
              opacity: 0;
            }
          }
        `;
        document.head.appendChild(style);
        
        element.appendChild(heart);
        setTimeout(() => heart.remove(), 1500);
      }

      function showTooltip(element, message) {
        const tooltip = document.getElementById('tooltip');
        tooltip.style.opacity = '1';
        tooltip.textContent = message;
        
        setTimeout(() => {
          tooltip.style.opacity = '0';
        }, 1500);
      }

      // FAB click animation
      document.getElementById('fab').addEventListener('click', function() {
        this.style.transform = 'scale(0.9) rotate(90deg)';
        setTimeout(() => {
          this.style.transform = '';
          window.scrollTo({
            top: 0,
            behavior: 'smooth'
          });
        }, 200);
      });

      // Smooth scroll for CTA
      document.querySelector('.cta-button').addEventListener('click', () => {
        document.querySelector('.feed').scrollIntoView({
          behavior: 'smooth'
        });
      });

      // Initialize everything
      createPosts();

      // Add keyframe animation for slideIn
      const style = document.createElement('style');
      style.textContent = `
        @keyframes slideIn {
          from {
            opacity: 0;
            transform: translateX(-20px);
          }
          to {
            opacity: 1;
            transform: translateX(0);
          }
        }
      `;
      document.head.appendChild(style);
    })();
  </script>
